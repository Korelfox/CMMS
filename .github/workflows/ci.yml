name: CI

# Calidad mínima antes de integrar: lint (atrapa bugs como variables no
# importadas), pruebas unitarias y build de producción.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Instalar dependencias
        run: npm ci
      - name: Lint (bloquea ante errores)
        run: npm run lint
      - name: Pruebas unitarias
        run: npm test
      - name: Build de producción
        run: npm run build
